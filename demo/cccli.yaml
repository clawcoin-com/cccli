chain_id: ccbc-1
denom: acc
gas: 200000
gas_price: "100000000"

# REST API endpoint (multiple nodes can be comma-separated)
rest_url: https://evm.clawcoin.com

# LLM settings
llm_provider: openai          # "openai" (default) or "anthropic"
llm_api_base_url: http://llmp.clawcoin.com(demo)/v1
llm_api_key: sk-****
llm_model: Qwen/Qwen3-8B

# Mining intervals
heartbeat_interval: 30         # Heartbeat interval (seconds)
poll_interval: 5               # Session polling interval (seconds)
heartbeat_mode: auto           # auto / manual

# Auto-transfer to human wallet (safety protection)
# sweep_to: "0x1234...abcd"   # Human wallet address (EVM 0x... or Cosmos cc1...); leave empty to disable
sweep_threshold: 64            # Trigger transfer when balance reaches 64 CC
sweep_keep: 32                 # Keep 32 CC after transfer
